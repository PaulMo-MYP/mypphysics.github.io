<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiation Absorption Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f8f7f2;
      --bg2:       #efefea;
      --text:      #3d3d3a;
      --muted:     #9c9a92;
      --border:    rgba(60,60,50,0.15);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font:      system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:    #1a1a18;
        --bg2:   #252523;
        --text:  #c2c0b6;
        --muted: #6e6d66;
        --border: rgba(200,200,180,0.12);
      }
    }

    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      padding: 2rem 1rem;
    }

    .sim-container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.85rem;
      flex-wrap: wrap;
    }

    .ctrl label {
      font-size: 13px;
      color: var(--muted);
      min-width: 120px;
    }

    select {
      flex: 1;
      padding: 6px 10px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg2);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      appearance: auto;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #378ADD;
    }

    .val {
      font-size: 13px;
      font-weight: 500;
      min-width: 46px;
      text-align: right;
      color: var(--text);
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .canvas-wrap {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 1rem;
    }

    .card {
      background: var(--bg2);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
    }

    .card .card-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .card .card-value {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="sim-container">
    <h1>Radiation Absorption Simulator</h1>

    <div class="ctrl">
      <label for="radType">Radiation type</label>
      <select id="radType" onchange="reset()">
        <option value="alpha">Alpha (&#945;)</option>
        <option value="beta">Beta (&#946;)</option>
        <option value="gamma" selected>Gamma (&#947;)</option>
        <option value="neutron">Neutron (n)</option>
      </select>
    </div>

    <div class="ctrl">
      <label for="matType">Shield material</label>
      <select id="matType" onchange="reset()">
        <option value="air">Air</option>
        <option value="paper">Paper</option>
        <option value="aluminium">Aluminium</option>
        <option value="concrete">Concrete</option>
        <option value="lead">Lead</option>
        <option value="water">Water</option>
        <option value="polyethylene">Polyethylene</option>
      </select>
    </div>

    <div class="ctrl">
      <label for="thickness">Shield thickness</label>
      <input type="range" id="thickness" min="1" max="100" value="30" step="1" oninput="updateThick()">
      <span class="val" id="thickVal">30 cm</span>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:#E24B4A"></span>Alpha</span>
      <span class="legend-item"><span class="dot" style="background:#378ADD"></span>Beta</span>
      <span class="legend-item"><span class="dot" style="background:#EF9F27"></span>Gamma</span>
      <span class="legend-item"><span class="dot" style="background:#1D9E75"></span>Neutron</span>
    </div>

    <div class="canvas-wrap">
      <canvas id="c" width="640" height="320"
              aria-label="Animated diagram showing radiation particles being absorbed or transmitted through a shield material"></canvas>
    </div>

    <div class="info-grid">
      <div class="card"><div class="card-label">Transmitted</div><div class="card-value" id="s-trans">-</div></div>
      <div class="card"><div class="card-label">Absorbed</div><div class="card-value" id="s-abs">-</div></div>
      <div class="card"><div class="card-label">Half-value layer</div><div class="card-value" id="s-hvl">-</div></div>
      <div class="card"><div class="card-label">Penetrating power</div><div class="card-value" id="s-pen">-</div></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 640, H = 320;

    const particleColors = {
      alpha:   '#E24B4A',
      beta:    '#378ADD',
      gamma:   '#EF9F27',
      neutron: '#1D9E75'
    };

    // Half-value layers in cm (illustrative; gamma/neutron values ~1 MeV equivalent)
    const hvlData = {
      alpha:   { air: 2,     paper: 0.01, aluminium: 0.003, concrete: 0.003, lead: 0.003, water: 0.003, polyethylene: 0.003 },
      beta:    { air: 100,   paper: 0.3,  aluminium: 0.15,  concrete: 0.5,   lead: 0.04,  water: 0.8,   polyethylene: 0.8   },
      gamma:   { air: 13000, paper: 18,   aluminium: 4.5,   concrete: 6.5,   lead: 0.9,   water: 13,    polyethylene: 14    },
      neutron: { air: 11000, paper: 9,    aluminium: 14,    concrete: 12,    lead: 22,    water: 4,     polyethylene: 3.5   },
    };

    const matColors = {
      air:          { fill: 'rgba(200,230,255,0.18)', stroke: 'rgba(100,160,220,0.35)', label: 'Air',          dashed: true  },
      paper:        { fill: '#E8D9C4',                stroke: '#C4A882',                label: 'Paper',        dashed: false },
      aluminium:    { fill: '#B4C8D8',                stroke: '#6E8EA0',                label: 'Aluminium',    dashed: false },
      concrete:     { fill: '#A8A8A0',                stroke: '#686860',                label: 'Concrete',     dashed: false },
      lead:         { fill: '#6A6870',                stroke: '#3A383C',                label: 'Lead',         dashed: false },
      water:        { fill: '#A8D4F0',                stroke: '#4890C0',                label: 'Water',        dashed: false },
      polyethylene: { fill: '#C8E4C0',                stroke: '#78B070',                label: 'Polyethylene', dashed: false },
    };

    const penetratingPower = {
      alpha:   'Very low (stopped by ~4 cm air)',
      beta:    'Low (stopped by ~1 m air / ~5 mm Al)',
      gamma:   'High (needs cm of lead)',
      neutron: 'Variable (needs H-rich material)',
    };

    // Fixed layout
    const SRC_X         = 48;
    const DETECTOR_X    = W - 40;
    const SHIELD_CENTRE = 340;
    const SHIELD_W_MIN  = 20;
    const SHIELD_W_MAX  = 320;
    const EMIT_Y_MIN    = 60;
    const EMIT_Y_MAX    = 260;
    const N_PARTICLES   = 40;

    // Molecule dot positions for air (fixed pseudo-random)
    const MOL_FX = [0.08,0.18,0.29,0.38,0.47,0.55,0.63,0.72,0.81,0.90,0.13,0.34,0.56,0.77,0.23,0.66];
    const MOL_FY = [0.20,0.55,0.32,0.70,0.15,0.80,0.45,0.28,0.62,0.38,0.85,0.50,0.22,0.68,0.42,0.75];

    let particles = [];
    let animId    = null;

    function shieldBounds(thick) {
      const t  = (thick - 1) / 99;
      const w  = SHIELD_W_MIN + t * (SHIELD_W_MAX - SHIELD_W_MIN);
      const x0 = SHIELD_CENTRE - w / 2;
      const x1 = SHIELD_CENTRE + w / 2;
      return { x0, x1, w };
    }

    function getParams() {
      return {
        rad:   document.getElementById('radType').value,
        mat:   document.getElementById('matType').value,
        thick: parseInt(document.getElementById('thickness').value),
      };
    }

    function updateThick() {
      document.getElementById('thickVal').textContent =
        document.getElementById('thickness').value + ' cm';
      reset();
    }

    function fractionTransmitted(rad, mat, thick) {
      return Math.pow(0.5, thick / hvlData[rad][mat]);
    }

    function reset() {
      if (animId) cancelAnimationFrame(animId);
      const { rad, mat, thick } = getParams();
      const frac = fractionTransmitted(rad, mat, thick);
      const { x0, w } = shieldBounds(thick);

      particles = [];
      for (let i = 0; i < N_PARTICLES; i++) {
        const y           = EMIT_Y_MIN + Math.random() * (EMIT_Y_MAX - EMIT_Y_MIN);
        const speed       = rad === 'alpha' ? 1.5 : rad === 'beta' ? 2.2 : rad === 'neutron' ? 1.8 : 2.8;
        const maxScatter  = rad === 'alpha' ? 0.18 : rad === 'beta' ? 0.12 : rad === 'neutron' ? 0.2 : 0.05;
        const transmitted = Math.random() < frac;
        particles.push({
          x: SRC_X + 14, y,
          vy: (Math.random() - 0.5) * maxScatter * speed * 2,
          vx: speed + (Math.random() - 0.5) * 0.3,
          alive: true, transmitted, absorbed: false, absorbAt: null,
          color: particleColors[rad], trail: [], rad,
        });
      }

      particles.forEach(p => {
        if (!p.transmitted) {
          const hvl       = hvlData[p.rad][mat];
          const depthCm   = -hvl * Math.log(Math.random() + 0.001);
          const fracDepth = Math.min(depthCm / thick, 0.98);
          p.absorbAt = x0 + fracDepth * w;
        }
      });

      // Update stat cards
      document.getElementById('s-trans').textContent = (frac * 100).toFixed(1) + '%';
      document.getElementById('s-abs').textContent   = ((1 - frac) * 100).toFixed(1) + '%';
      const hvl = hvlData[rad][mat];
      document.getElementById('s-hvl').textContent   =
        hvl >= 100 ? (hvl / 100).toFixed(0) + ' m' :
        hvl >= 1   ? hvl.toFixed(1) + ' cm'         :
                     (hvl * 10).toFixed(1) + ' mm';
      document.getElementById('s-pen').textContent   = penetratingPower[rad];

      animId = requestAnimationFrame(draw);
    }

    function draw() {
      const { rad, mat, thick } = getParams();
      const { x0, x1, w }      = shieldBounds(thick);
      const mc = matColors[mat];

      ctx.clearRect(0, 0, W, H);

      const isDark     = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const bgColor    = isDark ? '#1a1a18' : '#f8f7f2';
      const textColor  = isDark ? '#c2c0b6' : '#3d3d3a';
      const mutedColor = isDark ? '#6e6d66' : '#9c9a92';

      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, W, H);

      // Shield block
      ctx.fillStyle   = mc.fill;
      ctx.strokeStyle = mc.stroke;
      ctx.lineWidth   = 1;
      if (mc.dashed) ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.roundRect(x0, 20, w, H - 40, Math.min(8, w / 2));
      ctx.fill();
      ctx.stroke();
      ctx.setLineDash([]);

      // Shield label
      if (w > 40) {
        ctx.fillStyle  = textColor;
        ctx.font       = '500 12px system-ui, sans-serif';
        ctx.textAlign  = 'center';
        ctx.fillText(mc.label, SHIELD_CENTRE, 38);
      }

      // Air molecule dots
      if (mat === 'air' && w > 80) {
        ctx.fillStyle = 'rgba(100,160,220,0.25)';
        for (let i = 0; i < MOL_FX.length; i++) {
          ctx.beginPath();
          ctx.arc(x0 + MOL_FX[i] * w, 30 + MOL_FY[i] * (H - 60), 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Thickness bracket + label
      ctx.fillStyle   = mutedColor;
      ctx.font        = '12px system-ui, sans-serif';
      ctx.textAlign   = 'center';
      ctx.fillText(thick + ' cm', SHIELD_CENTRE, H - 10);
      ctx.strokeStyle = mutedColor;
      ctx.lineWidth   = 0.5;
      const bY = H - 22;
      ctx.beginPath();
      ctx.moveTo(x0, bY - 4); ctx.lineTo(x0, bY + 4);
      ctx.moveTo(x0, bY);     ctx.lineTo(SHIELD_CENTRE - 22, bY);
      ctx.moveTo(x1, bY - 4); ctx.lineTo(x1, bY + 4);
      ctx.moveTo(x1, bY);     ctx.lineTo(SHIELD_CENTRE + 22, bY);
      ctx.stroke();

      // Source disc
      ctx.fillStyle = particleColors[rad];
      ctx.beginPath();
      ctx.arc(SRC_X, H / 2, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = bgColor;
      ctx.font      = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(
        rad === 'alpha' ? '\u03B1' : rad === 'beta' ? '\u03B2' : rad === 'gamma' ? '\u03B3' : 'n',
        SRC_X, H / 2 + 4
      );
      ctx.fillStyle = mutedColor;
      ctx.font      = '12px system-ui, sans-serif';
      ctx.fillText('Source', SRC_X, H - 10);

      // Detector bar
      ctx.fillStyle   = isDark ? '#3a3a38' : '#e0e0d8';
      ctx.strokeStyle = isDark ? '#555555' : '#aaaaaa';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.roundRect(DETECTOR_X - 10, EMIT_Y_MIN - 10, 18, (EMIT_Y_MAX - EMIT_Y_MIN) + 20, 4);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = mutedColor;
      ctx.font      = '12px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Detector', DETECTOR_X, H - 10);

      // Draw particles
      particles.forEach(p => {
        if (!p.alive) return;

        if (p.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(p.trail[0].x, p.trail[0].y);
          for (let i = 1; i < p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
          ctx.strokeStyle = p.absorbed
            ? (isDark ? '#ff6b4a44' : '#cc330022')
            : p.color + '55';
          ctx.lineWidth = p.absorbed ? 1 : 1.2;
          ctx.setLineDash(p.absorbed ? [2, 3] : []);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        if (!p.absorbed) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, rad === 'alpha' ? 4 : 2.5, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        } else {
          ctx.strokeStyle = '#cc3300';
          ctx.lineWidth   = 1.5;
          const r = 3;
          ctx.beginPath();
          ctx.moveTo(p.absorbAt - r, p.y - r); ctx.lineTo(p.absorbAt + r, p.y + r);
          ctx.moveTo(p.absorbAt + r, p.y - r); ctx.lineTo(p.absorbAt - r, p.y + r);
          ctx.stroke();
        }
      });

      // Advance particles
      let anyAlive = false;
      particles.forEach(p => {
        if (!p.alive) return;
        if (p.absorbed) { p.alive = false; return; }

        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 30) p.trail.shift();

        if (!p.transmitted && p.x >= p.absorbAt) {
          p.absorbed = true;
          p.alive    = false;
          return;
        }

        p.x += p.vx;
        p.y += p.vy;

        // Slow particles inside the shield
        if (p.x > x0 && p.x < x1) {
          const sf = rad === 'alpha' ? 0.4 : rad === 'beta' ? 0.7 : rad === 'gamma' ? 0.95 : 0.8;
          p.vx = Math.max(0.2, p.vx * (0.98 + (1 - 0.98) * (1 - sf)));
          p.vy *= 0.98;
        }

        if (p.x > DETECTOR_X || p.y < 10 || p.y > H - 10) p.alive = false;
        anyAlive = true;
      });

      if (anyAlive) {
        animId = requestAnimationFrame(draw);
      } else {
        setTimeout(reset, 1200);
      }
    }

    reset();
  </script>
</body>
</html>
